<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            color: #fff;
            font-family: sans-serif;
        }
        .container{
            display: flex;
        }
        .section-1{
            background-color: rgb(0, 0, 0);
            width: 50%;
            height: 100vh;
            z-index: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
.Login-form{
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    gap: 1rem;
    padding: 1.5rem;
}
.item-1{
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    font-size: 0.8rem;
    text-align: center;
}
.item-1 p{
    color:rgb(223, 223, 223);
}
.google{
    width: 300px;
    border: 1px solid rgba(223, 223, 223, 0.372);
    text-align: center; 
    padding: 8px;
    border-radius: 0.5rem;
}
form{
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    padding: 20px;
}
.email{
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    padding: 0.5rem;
    border-radius: 0.5rem;
}
.email input{
    border: none;
    padding: 10px;
    width: 300px;
    background-color: #181818;
}
.email input::placeholder{
    color: rgb(156, 156, 156);
}
.email input:focus{
    outline: none;
}
.password{
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    padding: 0.5rem;
    border-radius: 0.5rem;
}
.password input{
    border: none;
    padding: 10px;
    width: 300px;
    background-color: #181818;

}
.password input::placeholder{
     color: rgb(156, 156, 156); 
}
    .btn{
            background-color:blue;
            padding: 10px;
            border-radius: 0.3rem;
            border: none;
            cursor: pointer;
            width: 300px;
        }


        .section-2{
            background-color: rgb(255, 255, 255);
            width: 50%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;

        }
        .gradient-1{
            position: fixed;
          bottom:200px;
          width: 700px;
          height: 700px;
          border-radius: 50%;
          background: blue;
          filter: blur(70px);
          opacity: 1;
        }
        .gradient-2{
          position: fixed;
          bottom: 350px;
          width: 700px;
          height: 700px;
          border-radius: 50%;
          background: rgb(0, 0, 0);
          filter: blur(40px);
          opacity: 1;
          z-index: 1;
        }
    

        hr{
            width: 300px;
            color: gray;
            opacity: 0.5;
        }
        .or-text{
            position: relative;
            top: -10px;
            left: 145px;
            background-color: black;
            text-align: center;
        }
        .rem{
        display: flex;
        width: 100%;
        justify-content: space-between;
        padding: 10px;
        font-size: 0.8rem;
        }
        .rem div{
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }
        .rem div a{
            text-decoration: none;
            color: #fff;
            text-decoration: underline;
        }
        .footer{
            display: flex;
            justify-content: space-between;
            width: 100%;
            font-size: 0.8rem;
            padding: 1rem;
            color: rgb(255, 255, 255);
            opacity: 0.5;
        }
        .header{
            display: flex;
            justify-content: space-between;
            width: 100%;
            padding: 1rem;
            color: rgb(255, 255, 255);
        }
        .header img{
            position: absolute;
            width: 50px;
            height: 50px;
        }
      .links{
        background-color: rgb(59, 59, 59);
        padding: 10px;
        border-radius: 20px;
        width: 150px;
        height: 40px;
        display: flex;
        justify-content: space-between;
        align-items: center;
       
      }
      .links a{
        text-decoration: none;
        color: #fff;
      }
      .Sign-up-d{
        position: absolute;
        border-radius: 1rem;
        padding: 8px;
        top: 17px;
        margin-left: -6.5px;
        background-color: rgb(0, 0, 0);
         backdrop-filter: calc(20px);
         -webkit-backdrop-filter: calc(20px);
      }
     
      .Sign-in-d{
       position: absolute;
        border-radius: 1rem;
        padding: 8px;
        top: 17px;
        margin-left: -56.5px;
        color:#5a5a5a;
      }

    </style>
</head>
<body>
    <div class="container">
      
    <div class="section-1">
          <div class="header">
            <div><img src="./spurvance-logo.png" alt=""></div>
            <div class="links">
               <a href=""><div class="Sign-up-d">Sign up</div></a>
                <a href=""><div class="Sign-in-d">Sign in</div></a>
            </div>

        </div>
        <div class="Login-form">
        <div class="item-1">
            <div><h1>Login to your account</h1></div>
            <div><p>Enter your detail to login</p></div>
        </div>
        <div class="google"><span>Continue with Google</span>
        </div>
        <div><hr> <span class="or-text">or</span></div>
        <form action="">
        <div class="email">
            <label for="">Email Address</label>
            <input type="email" placeholder="johndoe@gmail.com">
        </div>
        <div class="password">
            <label for="">Password</label>
            <input type="password" placeholder="*************">
        </div>
        <div class="rem">
            <div><input style="" type="checkbox"><span>Keep me logged in</span></div>
            <div><a href="">Forget Password?</a></div>
        </div>
        <div>
            <button type="submit" class="btn">Login</button>
        </div>
        </form>
        </div>


        <div class="footer">
            <div>© 2026 Spurvancelab</div>
            <div>ENG</div>
        </div>
    </div>
    <div class="section-2">
        <div class="gradient-2"></div>
        <div class="gradient-1"></div>
    </div>
    </div>
</body>
</html>
